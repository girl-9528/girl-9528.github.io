<!DOCTYPE html>
<html>
<head>
    <title>龙影阁</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: gold;
            text-align: center;
        }

        /* 背景视频 */
        video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        h1 {
            margin-top: 50px;
            font-size: 50px;
        }

        .movies {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 200px;
            margin: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid gold;
            border-radius: 10px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
        }

        button {
            width: 100%;
            padding: 10px;
            background: gold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<h1>🐉 龙影阁 🎬</h1>

<div class="movies">

    <div class="card">
        <img src="https://picsum.photos/200/300?1">
        <button onclick="play()">播放</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200/300?2">
        <button onclick="play()">播放</button>
    </div>

</div>

<script>
function play(){
    alert("这里以后可以接你的服务器电影 😏");
}
</script>

</body>
</html>
